    mattermost: https://chat.embl.org/embl/channels/data-science
    ticket: https://tickets.embl.org/new?queue=data-science # placeholder — update to your real queue

  bioimage-analysis:
    name: Bioimage Analysis Service
    kind: dsc
    blurb: Reproducible extraction of quantitative information from microscopy data.
    icon: microscope
    pillars: [consulting, infrastructure, training]
