# Services catalogue. Links will be provided later — leave `link` empty until then.
services:
  - id: consulting
    name: Data science consulting
    blurb: Book a one-to-one session with a data-science expert.
    team: internal-support
    link: ""
  - id: bioimage-service
    name: Bioimage analysis service
    blurb: Get help extracting quantitative data from your microscopy images.
    team: bioimage-analysis
    link: ""
  - id: data-management-support
    name: Data management support
    blurb: Plan, organise, document and share your research data (FAIR / RDM).
    team: data-management
    link: ""
  - id: training-courses
    name: Training courses & workshops
    blurb: Browse and sign up for data and software skills courses.
    team: internal-support
    link: ""
  - id: infrastructure-access
    name: Access to compute platforms
    blurb: Get access to JupyterHub, BAND, Galaxy and other shared platforms.
    team: modis
    link: ""

scenarios:
  # ── Data Science questions (yes) ──────────────────────────────────────────
  - id: cells
    persona: fellow
    question: I have 10,000 microscopy images and need to count the cells in all of them.
    data_science: yes
    team: bioimage-analysis
    needs: [image-analysis]
    why: Counting cells across thousands of images is core bioimage-analysis work.
    difficulty: easy

  - id: which-test
    persona: fellow
    question: I ran an experiment with three conditions and don't know which statistical test to use.
    data_science: yes
    team: internal-support
    needs: [statistics]
    why: Choosing and interpreting a statistical test is exactly what the internal support team's statisticians help with.
    difficulty: easy

  - id: cluster
    persona: staff
    question: My analysis takes days on my laptop — can I run it as a proper pipeline on the cluster?
    data_science: yes
    team: modis
    needs: [workflows]
    why: Turning an analysis into a scalable, reproducible workflow is MODIS / workflow-management territory.
    difficulty: easy

  - id: spreadsheet
    persona: PI
    question: My lab's data is scattered across messy spreadsheets and nobody can find anything.
    data_science: yes
    team: data-management
    needs: [data-management]
    why: Structuring, documenting and sharing a lab's data is data-management work — often mistaken for an IT problem.
    difficulty: boundary

  - id: phenotype-ml
    persona: fellow
    question: I want to train a model to automatically classify cell phenotypes from my images.
    data_science: yes
    team: bioimage-analysis
    needs: [machine-learning, image-analysis]
    why: Training a model to classify phenotypes from images combines machine learning with bioimage analysis.
    difficulty: easy

  - id: replicates
    persona: PI
    question: How many biological replicates do I actually need for this experiment?
    data_science: yes
    team: internal-support
    needs: [statistics]
    why: How many replicates you need is a power-analysis question for the statisticians — best asked before you run the experiment.
    difficulty: boundary

  - id: organoid-3d
    persona: core-facility
    question: I need to measure the volume of organoids in 3D light-sheet stacks.
    data_science: yes
    team: bioimage-analysis
    needs: [image-analysis]
    why: Segmenting and measuring structures in 3D microscopy volumes is advanced image analysis.
    difficulty: easy

  - id: slow-script
    persona: fellow
    question: My Python analysis script works but is painfully slow — can someone help speed it up?
    data_science: yes
    team: internal-support
    needs: [software]
    why: Profiling and optimising research code is research-software-engineering help.
    difficulty: boundary

  - id: deposit-data
    persona: fellow
    question: A journal wants me to deposit my data in a public repository before publishing.
    data_science: yes
    team: data-management
    needs: [data-management]
    why: Choosing the right repository and making data FAIR is a data-management service.
    difficulty: easy

  - id: dmp
    persona: PI
    question: My grant application needs a data management plan and I don't know where to start.
    data_science: yes
    team: data-management
    needs: [data-management]
    why: Writing the data management plan for a grant is a core data-management service.
    difficulty: easy

  - id: learn-python
    persona: fellow
    question: I'd like to learn enough Python to analyse my own data.
    data_science: yes
    team: internal-support
    needs: [training]
    why: Learning to code for data analysis is covered by the Data Science Centre's training offer.
    difficulty: easy

  - id: version-control
    persona: staff
    question: Our analysis code is a mess of files called final_v3_REALLY_final.py — how do we manage it properly?
    data_science: yes
    team: internal-support
    needs: [software, training]
    why: Setting up version control and good software practice is research-software-engineering help.
    difficulty: boundary

  # ── Not the Data Science Centre (no) ──────────────────────────────────────
  # These sound computational/data-ish, but the real need is IT infrastructure,
  # access or licences — the DSC↔IT boundary the booth is meant to clarify.
  - id: gpu-server
    persona: PI
    question: I need a powerful GPU machine to train my deep-learning models.
    data_science: no
    team: it-services
    why: Buying and running GPU hardware is IT. Designing and training the model itself is the DSC — so come to us once the machine exists.
    difficulty: boundary

  - id: cluster-account
    persona: fellow
    question: I can't log in to the HPC cluster — my account isn't working.
    data_science: no
    team: it-services
    why: Accounts and access are managed by IT. How to actually run your analysis on the cluster is the DSC.
    difficulty: boundary

  - id: matlab-license
    persona: staff
    question: I need a MATLAB licence installed so I can run an analysis script.
    data_science: no
    team: it-services
    why: Software licences and installation are handled by IT — even when the software is for data analysis.
    difficulty: boundary

  - id: database-server
    persona: PI
    question: Can you set up a database server to hold my lab's data?
    data_science: no
    team: it-services
    why: Hosting and maintaining a database server is IT infrastructure. Structuring the data and making it FAIR is the DSC's Data Management team.
    difficulty: boundary

  - id: shared-drive
    persona: staff
    question: Our shared network drive is full and I can't save my results.
    data_science: no
    team: it-services
    why: Storage capacity and network drives are IT. The DSC can later help you organise and archive what's on them.
    difficulty: boundary

  - id: jupyter-down
    persona: fellow
    question: The shared JupyterHub server keeps crashing.
    data_science: no
    team: it-services
    why: Keeping the server infrastructure running is IT. Help writing or fixing the notebooks themselves is the DSC.
    difficulty: boundary

  - id: remote-access
    persona: fellow
    question: I can't reach my data on the institute server when I work from home.
    data_science: no
    team: it-services
    why: Remote access and VPN are handled by IT, not the Data Science Centre.
    difficulty: boundary

  - id: backups
    persona: PI
    question: I want automatic backups set up for my project files.
    data_science: no
    team: it-services
    why: Backup infrastructure is IT. Planning long-term data preservation and sharing is the DSC's Data Management team.
    difficulty: boundary
