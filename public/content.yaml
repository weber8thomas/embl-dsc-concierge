# ─────────────────────────────────────────────────────────────────────────────
# DSC Concierge content — edit this file to add or change anything shown in the app.
# No coding needed. Sections (in this file):
#
#   pillars       the 4 cross-cutting DSC pillars (training, consulting, community, infrastructure)
#   competencies  the controlled list of skill tags used by members & scenarios
#   teams         the DSC workstreams + external targets (was the routing "entities")
#   members       the people, shown in EMBL vf-profile style
#   platforms     concepts & platforms catalogue
#   training      training offerings catalogue
#   services      services catalogue (links can be filled in later)
#   scenarios     the swipe questions
#
# To add a question: copy a scenario block, change the text, set `team:` to a team id
# and (optionally) `needs:` to competency tags — the reveal then shows the matching people.
# personas:  fellow (predocs & postdocs) | staff | PI | core-facility
# data_science:  yes / no   ← the correct answer
#
# Tip: run `npm run validate` to check this file, and `npm run catalog` to regenerate
# the dsc-catalog.xlsx spreadsheet from it.
# ─────────────────────────────────────────────────────────────────────────────

pillars:
  training:
    name: Training
    blurb: Courses and workshops that build data and software skills.
    icon: graduation-cap
  consulting:
    name: Consulting
    blurb: One-to-one expert advice on your data, analysis and methods.
    icon: brain
  community:
    name: Community
    blurb: Connecting people, channels and events across EMBL data science.
    icon: share
  infrastructure:
    name: Infrastructure
    blurb: Shared platforms, compute and tools for doing the work.
    icon: server

# Controlled list of competency tags. Members are tagged with these, and a
# scenario's `needs:` references them to surface the right people.
competencies:
  image-analysis: { label: Image analysis }
  statistics: { label: Statistics }
  modeling: { label: Mathematical modeling }
  data-management: { label: Data management }
  workflows: { label: Scientific workflows }
  machine-learning: { label: Machine learning & AI }
  software: { label: Research software }
  web: { label: Web & dashboards }
  data-integration: { label: Data integration }
  training: { label: Training }
  community: { label: Community }
  leadership: { label: Leadership }
  operations: { label: Operations }
  research: { label: Research }

