scenarios:
  # ── Data Science questions (yes) ──────────────────────────────────────────
  - id: cells
    persona: fellow
    question: I've got 10,000 microscopy images and a manual cell-counting habit that's slowly destroying my sanity (and my clicking finger).
    data_science: yes
    team: bioimage-analysis
    needs: [image-analysis]
    why: Counting cells across thousands of images is bread-and-butter bioimage analysis, and far kinder to your tendons.

  - id: which-test
    persona: fellow
    question: Three conditions, a pile of data, and absolutely no idea whether it's a t-test, ANOVA, or vibes.
    data_science: yes
    team: internal-support
    needs: [statistics]
    why: Picking and interpreting the right statistical test is what the data science internal support statisticians are for, before you commit to vibes.

  - id: cluster
    persona: staff
    question: My analysis takes three days on my laptop, which doubles as a space heater, not what I need during a heatwave! Can we make it a real pipeline on the cluster?
    data_science: yes
    team: modis
    teams: [modis, data-management, internal-support, bioimage-analysis]
    needs: [workflows]
    why: Turning a slow laptop script into a scalable, reproducible cluster workflow is data-science territory, which DSC team helps depends on your data and use case.

  - id: spreadsheet
    persona: PI
    question: My lab's data lives in 47 spreadsheets named after their authors' moods, and nobody can find last year's results.
    data_science: yes
    team: data-management
    needs: [data-management]
    why: Structuring, documenting and sharing a lab's data is data-management work, frequently mistaken for an IT problem.

  - id: phenotype-ml
    persona: fellow
    question: I want a model to tell apart my cell phenotypes automatically, because my eyes give up around image number 300.
    data_science: yes
    team: bioimage-analysis
    needs: [machine-learning, image-analysis]
    why: Training a model to classify phenotypes from images combines machine learning with bioimage analysis, two things the DSC handles every day.

  - id: replicates
    persona: PI
    question: How many biological replicates do I actually need, asking for the reviewer who will definitely complain about n=3?
    data_science: yes
    team: internal-support
    needs: [statistics]
    why: Replicate numbers are a power-analysis question for the statisticians, best asked before you run the experiment, not after the reviewer does.

  - id: organoid-3d
    persona: core-facility
    question: I need the volume of every organoid in these 3D light-sheet stacks, and counting voxels by hand is not the retirement plan I had in mind.
    data_science: yes
    team: bioimage-analysis
    needs: [image-analysis]
    why: Segmenting and measuring structures in 3D microscopy volumes is advanced image analysis.

  - id: slow-script
    persona: fellow
    question: My Python script works, technically, I just have time to make coffee, drink it, and regret things while it runs. Can someone speed it up?
    data_science: yes
    team: internal-support
    needs: [software]
    cross_team: true
    why: Profiling and optimising research code is research-software-engineering help, and people across the DSC can dig into it depending on your stack.

  - id: metadata-standards
    persona: fellow
    question: A consortium insists my dataset follow "community metadata standards", which sounds important and means absolutely nothing to me right now.
    data_science: yes
    team: data-management
    needs: [data-management, data-integration]
    cross_team: true
    why: Translating "community metadata standards" into actual ontologies and fields is data-management and integration work, so your data plays nicely with everyone else's. Which DSC people help depends on your data.

  - id: dmp
    persona: PI
    question: My grant needs a data management plan, the deadline is Friday, and "I'll keep it on my laptop" apparently isn't one.
    data_science: yes
    team: data-management
    needs: [data-management]
    cross_team: true
    why: Writing a data management plan for a grant is core data-management work, and people across the DSC (including bioimage analysis) can help, ideally before Friday.

  - id: learn-python
    persona: fellow
    question: I'd like to learn just enough Python to analyse my own data and stop bribing the postdoc next door with cake.
    data_science: yes
    team: internal-support
    needs: [training]
    why: Learning to code for data analysis is covered by the Data Science Centre's training offer, cake optional.

  - id: version-control
    persona: staff
    question: Our codebase is fifteen files called final_v3_REALLY_final.py and we honestly don't know which one runs. Help?
    data_science: yes
    team: internal-support
    needs: [software, training]
    why: Setting up version control and sane software practice is research-software-engineering help from the internal support team.

  - id: count-the-dots
    persona: core-facility
    question: I have a beautiful confocal stack and just need someone to count the fluorescent puncta per nucleus, automatically, for 500 images.
    data_science: yes
    team: bioimage-analysis
    needs: [image-analysis]
    why: Automated puncta detection and per-nucleus quantification across hundreds of images is exactly what the Bioimage Analysis Service does.

  - id: shiny-deploy
    persona: fellow
    question: I built an R Shiny app to explore our results and my collaborators keep asking me to "just send the link", can someone host it properly instead of me leaving my laptop on overnight?
    data_science: yes
    team: modis
    needs: [web, software]
    cross_team: true
    people: [jean-karim-heriche, thomas-weber, jacobo-miranda]
    why: Deploying and hosting containerised interactive apps (Shiny, dashboards) on EMBL infrastructure is a DSC job, so your laptop can finally sleep. It is not always the obvious team, the people who run this hosting span several teams.

  - id: harmonise-metadata
    persona: PI
    question: I have five old datasets whose sample sheets each invented their own words for "timepoint" and "treatment", and I need them to line up so I can analyse them together.
    data_science: yes
    team: data-management
    needs: [data-management, data-integration]
    cross_team: true
    why: Harmonising inconsistent metadata into one coherent, integrable schema is data-management and integration work, so "t0", "0h" and "baseline" finally mean the same thing. Data Management leads, but they are not the only ones who can help.

  - id: containerise-pipeline
    persona: staff
    question: My analysis pipeline runs perfectly on my machine and absolutely nowhere else, I'd like to containerise it so reviewers (and future me) can actually reproduce it.
    data_science: yes
    team: modis
    needs: [workflows, software]
    cross_team: true
    channels: [singularity]
    people: [renato-alves, jean-karim-heriche, erick-martins-ratamero, tanuja-selvaraj, francesco-tabaro, nora-vivanco-gonzalez, thomas-weber]
    why: Containerising a pipeline for portability and reproducibility is data-science workflow and software work, and several people across the DSC (MODIS, Data Management and beyond) can help, defeating the eternal "works on my machine" curse.

  # ── Not the Data Science Centre (no) ──────────────────────────────────────
  # These sound computational/data-ish, but the real need is IT infrastructure,
  # access, licences, instrument time or a public archive, not the DSC.
  - id: gpu-server
    persona: PI
    question: I need a beast of a GPU machine to train my deep-learning model before the heat death of the universe.
    data_science: no
    team: it-services
    why: Buying and racking GPU hardware is IT. We (the DSC) help you design and train the model once the metal is humming, bring it to us then.

  - id: matlab-license
    persona: staff
    question: My script demands a MATLAB licence and refuses to run without one. Send help.
    data_science: no
    team: it-services
    why: Software licences and installation are IT's department, even when the software is pure data crunching. We can't conjure you a licence, sorry.

  - id: shared-drive
    persona: staff
    question: Our shared network drive is full and my results have nowhere to live. The dreaded "disk full" strikes again.
    data_science: no
    team: it-services
    why: Storage capacity and network drives are IT's to grow. The DSC can later help you tidy and archive the mess, but the extra terabytes come from IT.

  - id: remote-access
    persona: fellow
    question: Working from home and I can't reach my data on the institute server, the VPN and I are not on speaking terms.
    data_science: no
    team: it-services
    why: Remote access and VPN wrangling are IT, not the Data Science Centre. Once you're connected, we're happy to talk data.

  - id: demux-and-counts
    persona: fellow
    question: GeneCore sequenced my 96 RNA libraries, now can the DSC demultiplex them, run FastQC, and hand me a tidy gene-count matrix?
    data_science: no
    team: core-facilities
    why: Demultiplexing, standard QC reports and a reference-aligned count matrix are GeneCore's standard primary processing, delivered bundled with the run. The DSC only takes over for the custom downstream, differential expression, odd designs, integration.

  - id: uniprot-lookup
    persona: fellow
    question: Where do I find out if my protein of interest is already annotated in UniProt?
    data_science: no
    team: embl-ebi
    why: UniProt is an EMBL-EBI public resource, that's where annotations live. The DSC isn't a lookup desk for public databases.

  # ── A bit of both (shared) ────────────────────────────────────────────────
  # Genuinely split: you go to the lead first, and the partner handles the rest.
  # Either swipe counts, the point is to learn who owns which half.
  - id: cluster-account
    persona: fellow
    question: The HPC cluster keeps rejecting my login and I'm starting to take it personally.
    data_science: shared
    team: internal-support
    team_also: it-services
    needs: [infrastructure]
    cross_team: true
    channels: [cluster, bio-it]
    why: Come to the DSC first, we'll get you oriented and show you how to actually make the cluster do real analysis, then point you to IT, who own the accounts and SSH keys that unlock access.

  - id: database-server
    persona: PI
    question: Can you spin up a database server to hold my lab's ever-growing pile of data?
    data_science: shared
    team: data-management
    team_also: it-services
    needs: [data-management]
    why: Start with the DSC's Data Management team, they advise which database to pick and design a FAIR schema so it isn't chaos. IT then hosts and maintains the actual server (a VM or Kubernetes DB operator).

  - id: jupyter-down
    persona: fellow
    question: The shared JupyterHub server keeps crashing right in the middle of my analysis.
    data_science: shared
    team: internal-support
    team_also: it-services
    people: [renato-alves]
    why: The DSC runs and governs the JupyterHub service, so come to us first when it falls over. IT provides the underlying infrastructure it sits on.

  - id: backups
    persona: PI
    question: I'd like automatic backups for my project files, ideally before disaster strikes rather than after.
    data_science: shared
    team: data-management
    team_also: it-services
    needs: [data-management]
    why: Start with the DSC's Data Management team to plan what's worth keeping and how to preserve and share it long-term. IT then runs the backup infrastructure that copies your bytes.

  - id: reads-to-pipeline
    persona: PI
    question: GeneCore is handing me raw reads from a 200-sample study and I need a reproducible pipeline to process all of it.
    data_science: shared
    team: modis
    team_also: core-facilities
    needs: [workflows, data-management]
    why: Core Facilities deliver the raw reads; MODIS builds the scalable, reproducible pipeline to turn them into results. Two stops, one happy genomicist.

  - id: maxquant-search
    persona: staff
    question: My 40 protein samples are off the mass spec, can you run a MaxQuant search and give me identified, quantified proteins? Sounds like a proteomics-bioinformatics job, right?
    data_science: shared
    team: internal-support
    team_also: core-facilities
    needs: [statistics, workflows]
    why: A standard MaxQuant identification-and-quantification search is actually the Proteomics Core Facility's bundled service. Start with the DSC and we'll point you there for the standard search, then pick up the custom bit, bespoke statistics and a reproducible downstream workflow.

  - id: archive-before-pub
    persona: staff
    question: My paper's in review and I need to deposit my transcriptomics data in a public archive, which one, and how do I make it FAIR?
    data_science: shared
    team: data-management
    team_also: embl-ebi
    needs: [data-management]
    why: Data Management helps you pick the right repository and make the data FAIR; EMBL-EBI hosts the archive (e.g. ArrayExpress) that actually stores it. Talk to us first.

  - id: pipeline-and-dashboard
    persona: PI
    question: My core-facility output is great but my lab can't explore it, I want a pipeline that feeds an interactive dashboard everyone can click through.
    data_science: yes
    team: modis
    needs: [workflows, software, web]
    cross_team: true
    people: [thomas-weber, jean-karim-heriche, jacobo-miranda]
    why: The DSC wires your workflow into a deployable dashboard and helps polish and maintain the app, and which people help depends on your stack. Goodbye, screenshots pasted into Mattermost.

  - id: compound-annotation
    persona: fellow
    question: Metabolomics CF ran my samples and gave me annotated compounds, but now I want to correlate those metabolite levels against my custom drug-dose design, can the DSC crunch that?
    data_science: shared
    team: internal-support
    team_also: core-facilities
    needs: [statistics]
    why: Standard compound annotation is the Metabolomics Core Facility's bundled deliverable, so start with the DSC and we'll confirm that part lives there, then we pick up the custom downstream, the dose-response statistics and correlation analysis.

  - id: flow-gating
    persona: core-facility
    question: Flow Cytometry already gated my populations the standard way, now I want an unsupervised clustering and trajectory analysis across 80 samples to find a subset nobody's drawn a gate around yet.
    data_science: shared
    team: internal-support
    team_also: core-facilities
    needs: [statistics, machine-learning]
    why: Standard gating is the Flow Cytometry Core Facility's job; the DSC takes over for the custom bit, unsupervised clustering and high-dimensional analysis that no manual gate can capture. Talk to us first for the downstream.

  - id: deconvolved-quant
    persona: staff
    question: The Light Microscopy facility deconvolved and stitched my big tiled acquisition beautifully, now I need a custom pipeline to quantify membrane-to-cytoplasm ratios per cell across the whole mosaic.
    data_science: yes
    team: bioimage-analysis
    needs: [image-analysis]
    why: The facility already did the acquisition, deconvolution and stitching. Building a custom pipeline to quantify membrane-to-cytoplasm ratios per cell across the mosaic is DSC bioimage analysis.

  - id: collaborator-transfer
    persona: PI
    question: A collaborator in Japan needs to send us 8 TB of imaging data and email attachments are, shockingly, not up to the task.
    data_science: shared
    team: it-services
    team_also: data-management
    needs: [data-management]
    why: IT first, they own the secure large-file transfer (Aspera/Globus) that actually moves 8 TB across the planet. The DSC's Data Management team then helps structure and document what arrives so it isn't 8 TB of mystery.

  - id: site-to-site
    persona: staff
    question: I need to shuttle a multi-terabyte dataset from EMBL Heidelberg over to EMBL-EBI Hinxton, and dragging it onto a USB stick feels wrong somehow.
    data_science: shared
    team: it-services
    team_also: data-management
    needs: [data-management]
    why: Moving data between EMBL sites runs on IT's inter-site transfer infrastructure, so go to IT first. The DSC's Data Management team helps organise and document the dataset so the copy at the other end makes sense.
