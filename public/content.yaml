scenarios:
  # ── Data Science questions (yes) ──────────────────────────────────────────
  - id: cells
    persona: fellow
    question: I've got 10,000 microscopy images and a manual cell-counting habit that's slowly destroying my sanity (and my clicking finger).
    data_science: yes
    team: bioimage-analysis
    needs: [image-analysis]
    why: Counting cells across thousands of images is bread-and-butter bioimage analysis — and far kinder to your tendons.
    difficulty: easy

  - id: which-test
    persona: fellow
    question: Three conditions, a pile of data, and absolutely no idea whether it's a t-test, ANOVA, or vibes.
    data_science: yes
    team: internal-support
    needs: [statistics]
    why: Picking and interpreting the right statistical test is exactly what the internal support statisticians are for — before you commit to vibes.
    difficulty: easy

  - id: cluster
    persona: staff
    question: My analysis takes three days on my laptop, which is now also my space heater. Can we make it a real pipeline on the cluster?
    data_science: yes
    team: modis
    needs: [workflows]
    why: Turning a slow laptop script into a scalable, reproducible cluster workflow is MODIS / workflow-management territory.
    difficulty: easy

  - id: spreadsheet
    persona: PI
    question: My lab's data lives in 47 spreadsheets named after their authors' moods, and nobody can find last year's results.
    data_science: yes
    team: data-management
    needs: [data-management]
    why: Structuring, documenting and sharing a lab's data is data-management work — frequently mistaken for an IT problem.
    difficulty: boundary

