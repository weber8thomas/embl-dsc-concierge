<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="DSC Concierge">
  <!-- EMBL green roundel (lens) -->
  <circle cx="32" cy="32" r="32" fill="#18974c"/>
  <circle cx="32" cy="32" r="27.5" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="2"/>
  <!-- Hub: a central point linked out to the DSC's offerings. Symmetric about
       (32,32) so it sits dead-centre in the roundel. -->
  <g stroke="#ffffff" stroke-linecap="round">
    <path d="M32,19.5 L44.5,32 L32,44.5 L19.5,32 Z" fill="none" stroke-opacity="0.5" stroke-width="1.3"/>
    <g stroke-width="2.3">
      <line x1="32" y1="32" x2="32" y2="19.5"/>
      <line x1="32" y1="32" x2="44.5" y2="32"/>
      <line x1="32" y1="32" x2="32" y2="44.5"/>
      <line x1="32" y1="32" x2="19.5" y2="32"/>
    </g>
  </g>
  <g fill="#ffffff">
    <circle cx="32" cy="19.5" r="2.9"/>
    <circle cx="44.5" cy="32" r="2.9"/>
    <circle cx="32" cy="44.5" r="2.9"/>
    <circle cx="19.5" cy="32" r="2.9"/>
    <circle cx="32" cy="32" r="4.5"/>
  </g>
</svg>
