# CI for DSC Concierge.
#  • test:   validate content.yaml, run unit tests, ensure the app builds
#  • build:  build the container image and push it to the EMBL GitLab registry
#  • pages:  deploy the static build to GitLab Pages (self-hosted GitLab works too)
#
# The build uses a relative base ('./'), so it serves correctly from the
# GitLab Pages project sub-path (e.g. https://<group>.pages.embl.org/dsc-concierge/).

image: node:20-alpine

stages:
  - test
  - build
  - deploy

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

test:
  stage: test
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run validate
    - npm test
    - npm run build

# Build the container image (root Dockerfile → nginx:1.27-alpine serving dist/) and push it
# to this project's registry with Kaniko. No Docker-in-Docker, no manual credentials:
# GitLab injects $CI_REGISTRY*, and $CI_REGISTRY_IMAGE resolves to
# registry.git.embl.de/<group>/dsc-concierge automatically. Use that value in k8s/.
build-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    # On a tag pipeline use the tag (e.g. v1.1.0) as the image version; on a
    # default-branch push use the commit SHA. Both also (re)push :latest.
    - >-
      /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
      --destination "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# GitLab Pages publishes whatever ends up in the `public/` artifact. Vite already
# copies the source public/ (content.yaml, images) into dist during the build, so
# we can safely replace the source public/ with the finished dist/ here in CI.
pages:
  stage: deploy
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
    - rm -rf public
    - mv dist public
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
