server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed JS/CSS assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Content is edited in place; serve it as YAML and don't cache, so an updated
    # content.yaml shows up on the next refresh.
    location = /content.yaml {
        default_type text/yaml;
        add_header Cache-Control "no-cache";
    }

    # Single-page app: fall back to index.html for any unknown path.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
