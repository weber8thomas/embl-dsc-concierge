apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: datasci-concierge-app

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml

images:
  # Verify the registry domain (.de vs .org) against the build-image CI job's
  # $CI_REGISTRY_IMAGE output. Bump newTag per release (or pin to $CI_COMMIT_SHORT_SHA).
  - name: registry.git.embl.de/tweber/dsc-concierge
    newTag: latest
