apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: datasci-concierge-app

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml

images:
  # Bump newTag per release (or pin to a commit SHA, e.g. the $CI_COMMIT_SHORT_SHA
  # tag that CI pushes) instead of relying on :latest.
  - name: registry.git.embl.org/tweber/dsc-concierge
    newTag: v1.2.1
