apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dsc-concierge
  labels:
    app: dsc-concierge
  annotations:
    # EMBL cert-manager issues a HARICA certificate for the host below and writes
    # it to the `secretName` in spec.tls (created automatically).
    cert-manager.io/cluster-issuer: harica-issuer
spec:
  # internal-users = reachable from the EMBL network / VPN / wifi only.
  # Switch to external-users to expose it on the public internet.
  ingressClassName: internal-users
  tls:
    - hosts:
        - dsc-concierge.embl.org
      secretName: dsc-concierge-tls
  rules:
    - host: dsc-concierge.embl.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dsc-concierge
                port:
                  name: http
